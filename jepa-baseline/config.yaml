# Option A: conv-JEPA baseline for active_matter.
# Mirrors train_activematter_small.yaml from the reference implementation.

run_name: "activematter-convjepa-baseline"
out_path: "./checkpoints"
seed: 42
wandb_project: "physics-jepa-baseline"

# ---------------------------------------------------------------------------
# Dataset: we import the user's ActiveMatterDataset via Python introspection.
# Point `module` at whatever Python module your dataset class lives in; update
# `class_name` if it differs. Extra arguments flow through as kwargs.
# ---------------------------------------------------------------------------
dataset:
  module: "data"                     # e.g. "data" or "physics_jepa.data"
  class_name: "ActiveMatterDataset"
  num_chans: 11
  num_frames: 16                     # context = target = 16 frames
  kwargs:
    num_frames: 16
    resolution: [224, 224]
    noise_std: 1.0                   # Gaussian noise augmentation
    # Add any other kwargs your dataset needs (data_dir, stride, etc.)

# ---------------------------------------------------------------------------
# Model: conv_small with 5 stages.
#   dims=[16, 32, 64, 128, 128], res blocks=[3, 3, 3, 9, 3]
#   encoder output: (B, 128, 14, 14); predictor preserves that shape.
# ---------------------------------------------------------------------------
model:
  objective: "jepa"
  dims: [16, 32, 64, 128, 128]
  num_res_blocks: [3, 3, 3, 9, 3]
  drop_path_rate: 0.0
  predictor_expansion: 2

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
train:
  num_epochs: 30
  batch_size: 8                      # per device
  target_global_batch_size: 256      # grad accum to reach this
  num_workers: 4

  # Optimization
  lr: 1.0e-3
  min_lr: 1.0e-6
  weight_decay: 0.05
  betas: [0.9, 0.95]
  grad_clip: 1.0

  # Schedule
  lr_scheduler: "cosine"
  lr_scheduler_warmup_epochs: 2

  # VICReg
  sim_coeff: 2.0
  std_coeff: 40.0
  cov_coeff: 2.0
  vicreg_chunks: 5

  # Mixed precision
  use_amp: true
  amp_dtype: "bf16"                  # "bf16" or "fp16"

  # Logging / checkpointing
  report_every: 50
  save_every: 2
  val_steps: null                    # null = use full val set
