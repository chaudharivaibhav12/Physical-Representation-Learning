data:
  data_dir:   /scratch/sb10583/data/data
  num_frames: 16
  crop_size:  224
  stride:     1
  noise_std:  1.0

model:
  in_channels: 11
  embed_dim:   256
  depth:       6
  num_heads:   8
  mlp_ratio:   4.0
  patch_size:  16
  tubelet:     2
  num_frames:  16
  pred_dim:    128
  pred_depth:  4
  pred_heads:  4

ema:
  momentum_start: 0.996   # tau cosine-annealed to 0.9999 over training

training:
  epochs:          100
  batch_size:      8
  target_batch:    64      # effective batch = 64 via grad accumulation (8 steps)
  lr:              1.5e-4
  weight_decay:    0.05
  grad_clip:       1.0
  warmup_epochs:   10
  mask_ratio:      0.25    # fraction of tokens used as target (~392 of 1568)
  num_mask_blocks: 4       # number of contiguous spatiotemporal target blocks

checkpointing:
  out_dir:         /scratch/sb10583/checkpoints/vit-jepa-sarvesh
  save_every:      5    # epoch-level snapshots
  save_every_steps: 20  # step-level latest.pt saves

logging:
  log_every:     10
  wandb_project: active-matter-jepa-sarvesh
  run_name:      vit-jepa-sarvesh-p16-d6-ema
